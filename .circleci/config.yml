version: 2.1
orbs:
  architect: giantswarm/architect@9.4.1

workflows:
  build:
    jobs:
    - architect/push-to-registries:
        context: architect
        name: push-to-registries
        # dex base image is amd64-only; without a go-build job architect v9 would
        # otherwise fall back to linux/amd64,linux/arm64 and fail on the arm64 base.
        platforms: linux/amd64
        # Push only to gsoci here; the gsoci -> Aliyun mirror is handled
        # out-of-band by sync-china-registry below so the cross-Pacific push
        # cannot time out and block the chart catalog publish.
        split-china-push: true
        filters:
            # Trigger the job also on git tag.
          tags:
            only: /^v.*/
          branches:
            ignore:
            - main
            - master

    # Mirror gsoci -> Aliyun via the in-China giantswarm/galaxy-runner. Runs out
    # of band; an Aliyun mirror failure does NOT block the chart catalog publish.
    - architect/sync-china-registry:
        context: architect
        name: sync-china-registry
        requires:
        - push-to-registries
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore:
            - main
            - master

    - architect/push-to-app-catalog:
        name: push-to-control-plane-app-catalog
        app_catalog: control-plane-catalog
        app_catalog_test: control-plane-test-catalog
        context: architect
        chart: dex-app
        executor: app-build-suite
        persist_chart_archive: true
        push_to_oci_registry: true
        # Attach the workspace so the post-step below can read `.build_version`
        # (the canonical image tag persisted by push-to-registries).
        attach_workspace: true
        requires:
        - push-to-registries
        filters:
            # Trigger the job also on git tag.
          tags:
            only: /^v.*/
          branches:
            ignore:
            - main
            - master
        post-steps:
          - run:
              name: Create test values with built image tag
              command: |
                mkdir -p build
                cp tests/test-values.yaml build/test-values-dev.yaml
                # `.build_version` is written by architect's image-prepare-tag step in
                # push-to-registries (the canonical `gitsemver get` tag, including the
                # timestamped `-dev.<branch>.<date>.<time>` suffix for branch builds) and
                # persisted to the workspace. It is the exact tag push-to-registries
                # published, so the ATS deploys the image that was just built. Recomputing
                # it as "<last-tag>-<sha>" broke when architect v9 changed the dev-tag
                # format, leaving the ATS pulling a tag that is never pushed.
                if [ -f .build_version ]; then
                  DEV_TAG="$(cat .build_version)"
                  printf '\ndex:\n  dex:\n    image:\n      tag: "%s"\n' "${DEV_TAG}" >> build/test-values-dev.yaml
                  echo "test image tag set to ${DEV_TAG}"
                else
                  echo "WARNING: .build_version not found; using the chart's default image tag"
                fi
          - persist_to_workspace:
              root: build
              paths:
                - test-values-dev.yaml

      # make it available to customers (only tags)
    - architect/push-to-app-catalog:
        name: package and push chart to giantswarm catalog
        app_catalog: giantswarm-catalog
        app_catalog_test: giantswarm-test-catalog
        chart: dex-app
        context: architect
        executor: app-build-suite
        push_to_oci_registry: true
        requires:
        - push-to-registries
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore:
            - main
            - master

    - architect/push-to-app-catalog:
        name: package and push chart
        context: architect
        app_catalog: giantswarm-playground-catalog
        app_catalog_test: giantswarm-playground-test-catalog
        chart: dex-app
        executor: app-build-suite
        requires:
        - push-to-registries
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore:
            - main
            - master

    - architect/run-tests-with-ats:
        name: execute chart tests
        filters:
            # Do not trigger the job on merge to master.
          branches:
            ignore:
            - master
        requires:
        - push-to-control-plane-app-catalog
        app-test-suite_version: v0.4.1
        app-test-suite_container_tag: 0.4.1
        additional_app-test-suite_flags: "--app-tests-app-config-file build/test-values-dev.yaml"
