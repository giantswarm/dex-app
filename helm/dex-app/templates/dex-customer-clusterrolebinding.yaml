apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
{{ include "dex.labels.customer" . | indent 4 }}
  name: {{ include "resource.default.name.customer" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "resource.default.name.customer" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "resource.default.name.customer" . }}
    namespace: {{ .Release.Namespace }}
