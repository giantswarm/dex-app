apiVersion: v1
kind: Service
metadata:
  name: {{ include "resource.default.name.customer" . }}
  labels:
{{ include "dex.labels.customer" . | indent 4 }}
  annotations:
spec:
  type: ClusterIP
  sessionAffinity: None
  ports:
  - name: http
    targetPort: http
    port: 32000
  selector:
    app.kubernetes.io/component: {{ include "resource.default.name.customer" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
